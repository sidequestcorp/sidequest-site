<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIDE QUEST · Coming Soon</title>
<meta name="description" content="A daily dare app. One quest a day. Do it, prove it, earn points. Coming soon." />
<meta property="og:title" content="SIDE QUEST" />
<meta property="og:description" content="One quest a day, pulled from a deck. Do it, prove it, earn points. Coming soon." />
<meta property="og:type" content="website" />
<style>
  :root {
    --bg: #0b0d10;
    --panel: #101317;
    --fg: #f4f4f2;
    --dim: #9aa3ad;
    --line: #262b31;
    --accent: #ff5b1a;       /* signal amber */
    --accent-2: #2ee6a6;     /* tactical green */
    --mono: "SFMono-Regular", "JetBrains Mono", "Menlo", "Consolas", monospace;
    --sans: -apple-system, "Helvetica Neue", "Arial", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(255,91,26,0.12), transparent 60%),
      radial-gradient(900px 500px at -10% 20%, rgba(46,230,166,0.07), transparent 55%),
      var(--bg);
    background-attachment: fixed;
    color: var(--fg);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }
  ::selection { background: var(--accent); color: #0a0a0a; }

  .wrap { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 28px; }

  .label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--dim);
  }
  h1 { font-weight: 800; letter-spacing: -0.02em; line-height: 1.0; }

  /* ---- top bar ---- */
  header.bar {
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(8px);
  }
  header.bar .wrap { display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .brand { font-family: var(--mono); font-size: 13px; letter-spacing: 0.2em; font-weight: 700; }
  .brand b { background: var(--accent); color: #0a0a0a; padding: 2px 5px; }
  .status-dot {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--accent-2);
    display: flex; align-items: center; gap: 8px;
  }
  .status-dot i {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-2); display: inline-block;
    box-shadow: 0 0 0 0 rgba(46,230,166,0.6);
    animation: pulse 2.2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(46,230,166,0.5); }
    70% { box-shadow: 0 0 0 9px rgba(46,230,166,0); }
    100% { box-shadow: 0 0 0 0 rgba(46,230,166,0); }
  }

  /* ---- hero ---- */
  main { flex: 1; display: flex; align-items: center; padding: 80px 0; }
  .hero .stamp {
    display: inline-block; border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 14px; margin-bottom: 34px;
  }
  .hero h1 { font-size: clamp(52px, 12vw, 150px); text-transform: uppercase; }
  .hero h1 .o { -webkit-text-stroke: 1.5px var(--accent); color: transparent; }
  .hero .tag { margin-top: 26px; max-width: 560px; font-size: clamp(17px, 2.4vw, 21px); color: #cfcfcf; }
  .hero .soon {
    margin-top: 30px; font-family: var(--mono); font-size: 13px;
    color: var(--dim); letter-spacing: 0.06em;
  }
  .hero .soon b { color: var(--accent); }

  /* ---- email capture ---- */
  .signup { margin-top: 40px; max-width: 480px; }
  .signup .k {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--dim); margin-bottom: 12px;
  }
  form.notify { display: flex; gap: 0; flex-wrap: wrap; border: 1px solid var(--line); }
  form.notify input[type="email"] {
    flex: 1 1 220px; min-width: 0;
    background: var(--panel); border: none; color: var(--fg);
    font-family: var(--sans); font-size: 15px; padding: 16px 18px;
    outline: none;
  }
  form.notify input[type="email"]::placeholder { color: #5f6770; }
  form.notify button {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.16em;
    text-transform: uppercase; padding: 16px 24px; cursor: pointer;
    background: var(--accent); color: #0a0a0a; border: none;
    transition: all .15s; flex: 0 0 auto;
  }
  form.notify button:hover { background: var(--accent-2); }
  form.notify button:disabled { opacity: .6; cursor: default; }
  .signup .fine { margin-top: 12px; font-size: 12px; color: var(--dim); }
  .signup .msg { margin-top: 14px; font-family: var(--mono); font-size: 13px; min-height: 18px; }
  .signup .msg.ok { color: var(--accent-2); }
  .signup .msg.err { color: #ff4d4d; }

  /* ---- footer ---- */
  footer {
    border-top: 1px solid var(--line);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
    color: var(--dim);
  }
  footer .wrap { height: 56px; display: flex; align-items: center; justify-content: space-between; }
  footer a { color: var(--dim); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  @media (max-width: 560px) {
    form.notify button { flex: 1 1 100%; }
  }

  /* ---- opening animation (terminal boot) ---- */
  #intro {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    transition: opacity .5s ease;
  }
  #intro.done { opacity: 0; pointer-events: none; }
  #intro .term {
    font-family: var(--mono); font-size: clamp(13px, 2.6vw, 16px);
    line-height: 1.9; color: var(--accent-2);
    width: min(620px, 86vw); padding: 0 4px;
  }
  #intro .term .line { white-space: pre-wrap; }
  #intro .term .dim { color: var(--dim); }
  #intro .term .amber { color: var(--accent); }
  #intro .caret {
    display: inline-block; width: 9px; height: 1.05em;
    background: var(--accent-2); vertical-align: -2px;
    margin-left: 2px; animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  #intro .skip {
    position: fixed; bottom: 22px; right: 26px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--dim);
    background: none; border: none; cursor: pointer;
  }
  #intro .skip:hover { color: var(--accent); }
  body.intro-active { overflow: hidden; }

  @media (prefers-reduced-motion: reduce) {
    #intro { display: none; }
  }

  /* ---- custom crosshair cursor ---- */
  #cursor {
    position: fixed; top: 0; left: 0; z-index: 10000;
    pointer-events: none; transform: translate(-50%, -50%);
    mix-blend-mode: difference;
  }
  #cursor {
    width: 34px; height: 34px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    transition: width .18s ease, height .18s ease,
                border-color .18s ease, opacity .25s ease;
    opacity: 0;
  }
  /* tactical tick marks on the reticle */
  #cursor::before, #cursor::after {
    content: ""; position: absolute; background: var(--accent);
    top: 50%; left: 50%;
  }
  #cursor::before { width: 9px; height: 1px; transform: translate(-50%, -50%); }
  #cursor::after  { width: 1px; height: 9px; transform: translate(-50%, -50%); }
  #cursor.lock {
    width: 46px; height: 46px;
    border-color: var(--accent-2);
  }
  body.cursor-on { cursor: none; }
  body.cursor-on a, body.cursor-on button, body.cursor-on input { cursor: none; }

  @media (hover: none), (pointer: coarse) {
    #cursor { display: none; }
  }
</style>
</head>
<body class="intro-active">

<div id="cursor" aria-hidden="true"></div>

<div id="intro" aria-hidden="true">
  <div class="term" id="termOut"></div>
  <button class="skip" id="introSkip" type="button">Skip &rsaquo;</button>
</div>

<header class="bar">
  <div class="wrap">
    <span class="brand"><b>SQ</b>&nbsp; SIDE QUEST</span>
    <span class="status-dot"><i></i> Launching Soon</span>
  </div>
</header>

<main>
  <div class="wrap hero">
    <span class="stamp label">Daily Dare App</span>
    <h1>SIDE<br><span class="o">QUEST</span></h1>
    <p class="tag">One quest a day, pulled from a deck. Do it, prove it, earn points. Worth a story.</p>
    <p class="soon"><b>COMING SOON.</b> The deck is being built.</p>

    <div class="signup">
      <div class="k">Get notified at launch</div>
      <!-- Formspree: replace YOUR_FORM_ID with your real endpoint ID (see SETUP.md) -->
      <form class="notify" action="https://formspree.io/f/xvzjjayk" method="POST" id="notifyForm">
        <input type="email" name="email" placeholder="you@email.com" required aria-label="Email address" />
        <input type="hidden" name="_subject" value="New Side Quest waitlist signup" />
        <button type="submit">Notify Me</button>
      </form>
      <p class="fine">No spam. One email when we launch.</p>
      <p class="msg" id="formMsg" role="status" aria-live="polite"></p>
    </div>
  </div>
</main>

<footer>
  <div class="wrap">
    <span>&copy; 2026 SIDE QUEST</span>
    <span><a href="/privacy.html">PRIVACY</a> · <a href="/terms.html">TERMS</a></span>
    <span>STATUS: PRE-LAUNCH</span>
  </div>
</footer>

<script>
  // ---- Opening animation: typed terminal boot sequence ----
  (function () {
    var intro = document.getElementById('intro');
    var out = document.getElementById('termOut');
    var skip = document.getElementById('introSkip');
    if (!intro || !out) return;

    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduce) { finish(true); return; }

    // Each step: text to type, optional class, and a pause after it lands (ms).
    var steps = [
      { t: '> initializing SIDE QUEST', cls: '', pause: 260 },
      { t: '> loading deck ............ ', cls: 'dim', after: 'OK', afterCls: 'amber', pause: 320 },
      { t: '> syncing daily quest ..... ', cls: 'dim', after: 'OK', afterCls: 'amber', pause: 320 },
      { t: '> status: ', cls: 'dim', after: 'READY', afterCls: 'amber', pause: 420 },
      { t: '', cls: '', pause: 120 },
      { t: '> one quest a day. do it, prove it, earn points.', cls: '', pause: 650 }
    ];

    var si = 0, ci = 0, lineEl = null;
    var caret = document.createElement('span');
    caret.className = 'caret';

    function typeStep() {
      if (si >= steps.length) { caret.remove(); finish(false); return; }
      var step = steps[si];
      if (ci === 0) {
        lineEl = document.createElement('div');
        lineEl.className = 'line' + (step.cls ? ' ' + step.cls : '');
        out.appendChild(lineEl);
        lineEl.appendChild(caret);
      }
      if (ci < step.t.length) {
        caret.insertAdjacentText('beforebegin', step.t.charAt(ci));
        ci++;
        setTimeout(typeStep, 26 + Math.random() * 34);
      } else {
        if (step.after) {
          var tail = document.createElement('span');
          tail.className = step.afterCls || '';
          tail.textContent = step.after;
          lineEl.insertBefore(tail, caret);
        }
        si++; ci = 0;
        setTimeout(typeStep, step.pause || 200);
      }
    }

    function finish(instant) {
      if (skip) skip.style.display = 'none';
      intro.classList.add('done');
      document.body.classList.remove('intro-active');
      setTimeout(function () { if (intro && intro.parentNode) intro.remove(); }, instant ? 0 : 520);
    }

    if (skip) skip.addEventListener('click', function () { finish(false); });

    // small beat before the first keystroke
    setTimeout(typeStep, 350);
  })();

  // ---- Custom crosshair cursor with smooth follow + lock-on ----
  (function () {
    var fine = window.matchMedia && window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    if (!fine) return;
    var ring = document.getElementById('cursor');
    if (!ring) return;

    document.body.classList.add('cursor-on');
    var tx = window.innerWidth / 2, ty = window.innerHeight / 2;
    var rx = tx, ry = ty;

    window.addEventListener('mousemove', function (e) {
      tx = e.clientX; ty = e.clientY;
      ring.style.opacity = '1';
    });
    window.addEventListener('mouseout', function (e) {
      if (!e.relatedTarget) { ring.style.opacity = '0'; }
    });

    (function loop() {
      rx += (tx - rx) * 0.18; ry += (ty - ry) * 0.18;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(loop);
    })();

    // lock-on state over interactive elements
    document.addEventListener('mouseover', function (e) {
      if (e.target.closest('a, button, input')) ring.classList.add('lock');
    });
    document.addEventListener('mouseout', function (e) {
      if (e.target.closest('a, button, input')) ring.classList.remove('lock');
    });
  })();

  // Progressive enhancement: submit via fetch so the user stays on the page.
  // Falls back to a normal POST if JS is disabled.
  (function () {
    var form = document.getElementById('notifyForm');
    var msg = document.getElementById('formMsg');
    if (!form) return;
    form.addEventListener('submit', function (e) {
      // If the endpoint hasn't been set up yet, let the user know instead of a broken POST.
      if (form.action.indexOf('YOUR_FORM_ID') !== -1) {
        e.preventDefault();
        msg.textContent = 'Form not connected yet — see SETUP.md.';
        msg.className = 'msg err';
        return;
      }
      e.preventDefault();
      var btn = form.querySelector('button');
      var data = new FormData(form);
      btn.disabled = true;
      msg.textContent = 'Sending...';
      msg.className = 'msg';
      fetch(form.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } })
        .then(function (r) {
          if (r.ok) {
            form.reset();
            msg.textContent = "You're on the list. We'll be in touch.";
            msg.className = 'msg ok';
          } else {
            msg.textContent = 'Something went wrong. Try again.';
            msg.className = 'msg err';
          }
        })
        .catch(function () {
          msg.textContent = 'Network error. Try again.';
          msg.className = 'msg err';
        })
        .finally(function () { btn.disabled = false; });
    });
  })();
</script>

</body>
</html>
